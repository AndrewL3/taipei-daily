<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d9488" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>Taipei Daily</title>
    <!-- Critical CSS: prevent FOUC before Tailwind loads -->
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        border-width: 0;
        border-style: solid;
      }
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }
      body {
        background: oklch(0.985 0 0);
        -webkit-tap-highlight-color: transparent;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: oklch(0.18 0.015 260);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
